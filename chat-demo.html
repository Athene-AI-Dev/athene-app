<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Athene Chat — ATH-52 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080c;--card:rgba(20,24,36,0.9);--fg:#f0f0f5;--muted:#8a8a9a;--pink:#D96FAB;--blue:#5290B8;--bluelt:#7AADCF;--border:rgba(255,255,255,0.08);--green:#10b981;--yellow:#eab308;--red:#ef4444}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--fg);height:100vh;display:flex;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
textarea{font-family:inherit;outline:none;border:none;resize:none}

/* Sidebar */
.sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(10,14,22,0.95)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.new-chat-btn{width:100%;padding:10px;border-radius:14px;background:var(--pink);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.new-chat-btn:hover{background:#ECA8CC}
.thread-list{flex:1;overflow-y:auto;padding:8px}
.thread-item{padding:12px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);transition:all .15s;margin-bottom:2px}
.thread-item:hover{background:rgba(255,255,255,0.04);color:var(--fg)}
.thread-item.active{background:rgba(217,111,171,0.1);color:var(--pink)}
.thread-item .del{opacity:0;margin-left:auto;padding:4px;border-radius:6px;background:none;color:var(--red);font-size:11px;transition:opacity .15s}
.thread-item:hover .del{opacity:1}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Header */
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(217,111,171,0.06);border-bottom:1px solid var(--border);border-radius:0}
.header-left{display:flex;align-items:center;gap:14px}
.header-icon{width:44px;height:44px;border-radius:14px;background:var(--pink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(217,111,171,0.3)}
.header-title{font-size:15px;font-weight:800}
.header-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.live-badge{font-size:9px;background:rgba(16,185,129,0.12);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:700;margin-left:8px}
.mode-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.3);border-radius:10px;padding:3px;border:1px solid var(--border)}
.mode-tab{padding:6px 16px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);background:none;transition:all .2s}
.mode-tab.active{background:rgba(255,255,255,0.08);color:var(--pink)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.msg-row{display:flex;gap:14px;max-width:85%;animation:fadeUp .4s ease}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border)}
.msg-row.assistant .msg-avatar{background:rgba(82,144,184,0.1);color:var(--blue)}
.msg-row.user .msg-avatar{background:rgba(217,111,171,0.1);color:var(--pink)}
.msg-bubble{padding:18px 22px;border-radius:24px;font-size:14px;line-height:1.7;font-weight:400}
.msg-row.assistant .msg-bubble{background:var(--card);border:1px solid var(--border)}
.msg-row.user .msg-bubble{background:var(--pink);color:#fff;border:none}
.msg-time{font-size:10px;color:rgba(138,138,154,0.5);margin-top:4px;padding:0 8px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.msg-row.user .msg-time{text-align:right}
.typing{display:flex;align-items:center;gap:8px;color:var(--pink);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.typing .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pink);animation:bounce .6s infinite alternate;margin:0 2px}
.typing .dots span:nth-child(2){animation-delay:.2s}
.typing .dots span:nth-child(3){animation-delay:.4s}

/* Citations */
.citation{display:inline-flex;align-items:center;padding:2px 8px;margin:0 2px;background:rgba(82,144,184,0.1);border:1px solid rgba(82,144,184,0.2);border-radius:4px;font-size:10px;font-weight:700;color:var(--blue);cursor:pointer;text-transform:uppercase;letter-spacing:1px;position:relative;transition:background .2s}
.citation:hover{background:rgba(82,144,184,0.2)}
.citation-tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:11px;white-space:nowrap;z-index:99;color:var(--fg);text-transform:none;letter-spacing:0;font-weight:400}
.citation:hover .citation-tooltip{display:block}
.sources-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.source-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);transition:all .2s;cursor:pointer}
.source-chip:hover{color:var(--pink);border-color:rgba(217,111,171,0.3)}

/* Approval Card */
.approval-card{margin:0 24px;padding:20px;border-radius:24px;background:rgba(234,179,8,0.05);border:1px solid rgba(234,179,8,0.2);animation:fadeUp .4s ease}
.approval-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.approval-header h4{font-size:13px;font-weight:700}
.approval-header small{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.approval-payload{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:14px;font-family:monospace;font-size:11px;color:var(--fg);margin-bottom:14px;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.approval-actions{display:flex;gap:10px}
.btn-approve{padding:8px 16px;border-radius:10px;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;transition:background .2s}
.btn-approve:hover{background:#059669}
.btn-edit{padding:8px 16px;border-radius:10px;background:none;border:1px solid rgba(234,179,8,0.3);color:var(--yellow);font-size:12px;font-weight:700;transition:all .2s}
.btn-edit:hover{background:rgba(234,179,8,0.1)}
.btn-reject{padding:8px 16px;border-radius:10px;background:none;border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:12px;font-weight:700;transition:all .2s}
.btn-reject:hover{background:rgba(239,68,68,0.1)}
.approval-time{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:12px}
.approval-card.hidden{display:none}
.edit-area{display:none;margin-bottom:12px}
.edit-area textarea{width:100%;height:100px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--fg);font-family:monospace;font-size:11px}
.edit-actions{display:flex;gap:8px;margin-top:8px}

/* Composer */
.composer{padding:12px 24px 16px;position:relative}
.composer-inner{display:flex;align-items:flex-end;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:8px 8px 8px 18px;transition:border-color .2s}
.composer-inner:focus-within{border-color:rgba(217,111,171,0.4)}
.composer textarea{flex:1;background:none;color:var(--fg);font-size:14px;font-weight:500;min-height:44px;max-height:160px;padding:10px 0;line-height:1.5}
.composer textarea::placeholder{color:rgba(138,138,154,0.25);font-weight:700;text-transform:uppercase;letter-spacing:2px;font-size:11px}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .15s;box-shadow:0 4px 16px rgba(217,111,171,0.25)}
.send-btn:hover{background:#ECA8CC;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:default;transform:none}
.send-btn:active{transform:scale(.95)}
.char-count{font-size:10px;color:var(--muted);text-align:right;padding:4px 12px 0;display:none}
.char-count.warn{color:var(--yellow);display:block}
.char-count.over{color:var(--red);display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{to{transform:translateY(-6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="new-chat-btn" onclick="createThread()">＋ New Chat</button>
  </div>
  <div class="thread-list" id="threadList"></div>
</div>

<!-- Main -->
<div class="main">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="header-icon">⚡</div>
      <div>
        <div style="display:flex;align-items:center">
          <span class="header-title">Synthesis v4.2</span>
          <span class="live-badge">LIVE</span>
        </div>
        <div class="header-sub">🔒 Encrypted Pipeline</div>
      </div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode(this,'standard')">Standard</button>
      <button class="mode-tab" onclick="setMode(this,'analytical')">📊 Analytical</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Approval Card -->
  <div class="approval-card hidden" id="approvalCard">
    <div class="approval-header">
      <span style="font-size:18px" id="approvalIcon">📧</span>
      <div>
        <h4>Action Requires Approval</h4>
        <small id="approvalTool">send-email</small>
      </div>
    </div>
    <div class="approval-payload" id="approvalPayload"></div>
    <div class="edit-area" id="editArea">
      <textarea id="editTextarea"></textarea>
      <div class="edit-actions">
        <button class="btn-approve" onclick="saveEdit()">✓ Save &amp; Approve</button>
        <button class="btn-edit" onclick="toggleEdit()">Cancel</button>
      </div>
    </div>
    <div class="approval-actions" id="approvalActions">
      <button class="btn-approve" onclick="handleApproval('approve')">✓ Approve</button>
      <button class="btn-edit" onclick="toggleEdit()">✎ Edit</button>
      <button class="btn-reject" onclick="handleApproval('reject')">✕ Reject</button>
    </div>
    <div class="approval-time" id="approvalTime"></div>
  </div>

  <!-- Composer -->
  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="Ask Athene to synthesize anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
    <div class="char-count" id="charCount"></div>
  </div>
</div>

<script>
// State
let threads = [];
let activeThread = null;
let threadMessages = {};
let isStreaming = false;
let mode = 'standard';
let msgCounter = 0;
const MAX_LEN = 10000;

// Demo data
const demoSources = [
  {document_id:"doc_8f3a2b1c",title:"Q4 Revenue Analysis",source_type:"Google Drive",external_url:"#",chunk_index:0},
  {document_id:"doc_2e7d9f4a",title:"Product Roadmap 2026",source_type:"Notion",external_url:"#",chunk_index:1},
  {document_id:"doc_5c1b8e3d",title:"Engineering Sprint Notes",source_type:"Linear",external_url:null,chunk_index:2}
];

const demoResponses = [
  {text:"Based on your organizational data, I can see several key trends emerging. Revenue grew **23% QoQ** in Q4, primarily driven by enterprise expansion. The product team shipped 47 features across 12 sprints [doc_8f3a2b1c], while engineering velocity improved by 18% [doc_5c1b8e3d].\n\nThe roadmap for H1 2026 [doc_2e7d9f4a] focuses on three pillars:\n\n1. **AI-first search** — contextual retrieval across all integrations\n2. **Automated briefings** — daily synthesis of cross-departmental activity\n3. **Approval workflows** — human-in-the-loop for sensitive actions",sources:demoSources},
  {text:"Looking at the cross-departmental data, I've identified a correlation between customer churn signals and delayed product releases [doc_2e7d9f4a]. The engineering team's sprint velocity data [doc_5c1b8e3d] shows a 12% dip during the holiday period, which coincided with 3 major customer escalations.\n\nRecommendation: Implement buffer sprints before major release windows.",sources:[demoSources[1],demoSources[2]]},
  {text:"I've synthesized the latest organizational intelligence:\n\n• **Sales pipeline** is at $4.2M, up 31% from last quarter [doc_8f3a2b1c]\n• **Engineering** completed 89% of planned story points\n• **Customer Success** NPS score improved to 72 (+8 points)\n\nNo critical blockers detected across departments.",sources:[demoSources[0]]},
];

// Initialize
createThread();

// Thread management
function createThread() {
  const id = 'thread-' + Date.now();
  const t = {id, created: new Date(), updated: new Date()};
  threads.unshift(t);
  threadMessages[id] = [];
  switchThread(id);
  renderThreads();
}

function switchThread(id) {
  activeThread = id;
  renderThreads();
  renderMessages();
  document.getElementById('approvalCard').classList.add('hidden');
}

function deleteThread(id, e) {
  e.stopPropagation();
  threads = threads.filter(t => t.id !== id);
  delete threadMessages[id];
  if (activeThread === id) {
    if (threads.length) switchThread(threads[0].id);
    else createThread();
  }
  renderThreads();
}

function renderThreads() {
  const el = document.getElementById('threadList');
  el.innerHTML = threads.map(t => {
    const d = t.updated;
    const label = d.toLocaleDateString([],{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const active = t.id === activeThread ? ' active' : '';
    return `<div class="thread-item${active}" onclick="switchThread('${t.id}')">
      <span>💬</span><span>${label}</span>
      <button class="del" onclick="deleteThread('${t.id}',event)">🗑</button>
    </div>`;
  }).join('');
}

// Messages
function renderMessages() {
  const el = document.getElementById('messages');
  const msgs = threadMessages[activeThread] || [];
  el.innerHTML = msgs.map(m => {
    const rowClass = `msg-row ${m.role}`;
    const avatar = m.role === 'assistant' ? '⚡' : '👤';
    let content = m.content;
    if (m.isLoading && !m.content) {
      content = `<div class="typing"><div class="dots"><span></span><span></span><span></span></div> Synthesizing...</div>`;
    } else {
      content = renderCitations(content, m.sources || []);
      if (m.sources && m.sources.length && !m.isLoading) {
        content += renderSourceBar(m.sources);
      }
    }
    if (m.isAnalytical && m.role === 'assistant') {
      content = `<div style="display:flex;align-items:center;gap:8px;font-size:10px;text-transform:uppercase;letter-spacing:2px;font-weight:700;color:var(--pink);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">📊 Business Intelligence Synthesis</div>` + content;
    }
    return `<div class="${rowClass}">
      <div class="msg-avatar">${avatar}</div>
      <div>
        <div class="msg-bubble">${content}</div>
        <div class="msg-time">${m.timestamp}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderCitations(text, sources) {
  if (!sources || !sources.length) return text.replace(/\n/g,'<br>');
  return text.replace(/\n/g,'<br>').replace(/\[([a-zA-Z0-9_-]+)\]/g, (match, id) => {
    const src = sources.find(s => s.document_id === id);
    if (!src) return match;
    return `<span class="citation" onclick="if('${src.external_url||''}')window.open('${src.external_url}','_blank')">[${id.slice(0,8)}]<span class="citation-tooltip"><strong>${src.title||'Untitled'}</strong><br>Type: ${src.source_type}${src.external_url?'<br>🔗 Click to open':''}</span></span>`;
  });
}

function renderSourceBar(sources) {
  return `<div class="sources-bar">${sources.map(s =>
    `<span class="source-chip" ${s.external_url?`onclick="window.open('${s.external_url}','_blank')"`:''}>🔗 ${s.source_type}</span>`
  ).join('')}</div>`;
}

function now() {
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// Send
function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming || text.length > MAX_LEN) return;

  const msgs = threadMessages[activeThread];
  msgs.push({id:'u-'+(++msgCounter),role:'user',content:text,timestamp:now()});
  msgs.push({id:'a-'+(++msgCounter),role:'assistant',content:'',timestamp:now(),isLoading:true,isAnalytical:mode==='analytical',sources:[]});

  input.value = '';
  autoResize(input);
  updateSendBtn();
  renderMessages();
  isStreaming = true;

  // Update thread timestamp
  const t = threads.find(t => t.id === activeThread);
  if (t) t.updated = new Date();
  renderThreads();

  // Simulate streaming
  const resp = demoResponses[Math.floor(Math.random() * demoResponses.length)];
  simulateStream(resp.text, resp.sources);
}

function simulateStream(fullText, sources) {
  const msgs = threadMessages[activeThread];
  const assistantMsg = msgs[msgs.length - 1];
  let i = 0;
  const words = fullText.split(/(?<=\s)/);

  // Decide if we show an approval after this message
  const showApproval = Math.random() > 0.6;

  const interval = setInterval(() => {
    if (i < words.length) {
      assistantMsg.content += words[i];
      i++;
      renderMessages();
    } else {
      clearInterval(interval);
      assistantMsg.isLoading = false;
      assistantMsg.sources = sources;
      isStreaming = false;
      renderMessages();

      if (showApproval) {
        setTimeout(() => showApprovalCard(), 500);
      }
    }
  }, 40);
}

// Approval
function showApprovalCard() {
  const card = document.getElementById('approvalCard');
  const isEmail = Math.random() > 0.5;
  document.getElementById('approvalIcon').textContent = isEmail ? '📧' : '📅';
  document.getElementById('approvalTool').textContent = isEmail ? 'send-email' : 'create-calendar-event';
  const payload = isEmail
    ? {to:"team@company.com",subject:"Q4 Summary Report",body:"Please find the attached quarterly summary..."}
    : {title:"Sprint Planning Review",date:"2026-05-20T10:00:00Z",attendees:["eng-team@company.com"],duration_minutes:60};
  document.getElementById('approvalPayload').textContent = JSON.stringify(payload, null, 2);
  document.getElementById('editTextarea').value = JSON.stringify(payload, null, 2);
  document.getElementById('approvalTime').textContent = 'Requested at: ' + new Date().toLocaleString();
  card.classList.remove('hidden');
  document.getElementById('editArea').style.display = 'none';
  document.getElementById('approvalActions').style.display = 'flex';
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function handleApproval(action) {
  const card = document.getElementById('approvalCard');
  const msgs = threadMessages[activeThread];

  if (action === 'approve') {
    msgs.push({id:'a-'+(++msgCounter),role:'assistant',content:'✅ Action approved and executed successfully. The operation has been completed.',timestamp:now(),sources:[]});
  } else {
    msgs.push({id:'a-'+(++msgCounter),role:'assistant',content:'❌ Action was rejected. No changes were made. Let me know if you\'d like to proceed differently.',timestamp:now(),sources:[]});
  }
  card.classList.add('hidden');
  renderMessages();
}

function toggleEdit() {
  const ea = document.getElementById('editArea');
  const aa = document.getElementById('approvalActions');
  const show = ea.style.display === 'none';
  ea.style.display = show ? 'block' : 'none';
  aa.style.display = show ? 'none' : 'flex';
}

function saveEdit() {
  try {
    JSON.parse(document.getElementById('editTextarea').value);
    handleApproval('approve');
  } catch(e) {
    alert('Invalid JSON payload');
  }
}

// Input handling
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  setTimeout(updateSendBtn, 0);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  updateSendBtn();
  updateCharCount();
}

function updateSendBtn() {
  document.getElementById('sendBtn').disabled = !document.getElementById('input').value.trim() || isStreaming;
}

function updateCharCount() {
  const len = document.getElementById('input').value.length;
  const el = document.getElementById('charCount');
  el.textContent = `${len.toLocaleString()}/${MAX_LEN.toLocaleString()} characters`;
  el.className = 'char-count' + (len > MAX_LEN ? ' over' : len > MAX_LEN * 0.9 ? ' warn' : '');
}

function setMode(btn, m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

document.getElementById('input').addEventListener('input', () => updateSendBtn());
</script>
</body>
</html>
